[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.20"
evm_version = "paris"
optimizer = true
optimizer_runs = 200
remappings = [
    "@openzeppelin/contracts@5.2.0/=lib/openzeppelin-contracts-5.2.0/contracts/"
]

[profile.ci]
solc = "0.8.20"
evm_version = "paris"

[rpc_endpoints]
amoy = "https://rpc-amoy.polygon.technology/"
